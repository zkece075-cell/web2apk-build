name: Web2Apk Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "URL website yang akan dibungkus jadi APK (WebView)"
        required: true
      app_name:
        description: "Nama aplikasi"
        required: true
      icon_url:
        description: "URL icon aplikasi (opsional)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout template project
        uses: actions/checkout@v4
        with:
          # Ganti dengan repo template Android WebView-wrapper kamu sendiri
          repository: ${{ github.repository }}
          path: project

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Inject konfigurasi WebView
        working-directory: project
        run: |
          echo "APP_URL=${{ inputs.web_url }}" >> gradle.properties
          echo "APP_NAME=${{ inputs.app_name }}" >> gradle.properties
          if [ -n "${{ inputs.icon_url }}" ]; then
            curl -L "${{ inputs.icon_url }}" -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x project/gradlew

      - name: Build APK (release)
        working-directory: project
        run: ./gradlew assembleRelease --stacktrace

      - name: Locate APK output
        id: locate
        run: |
          APK_PATH=$(find project -type f -name "*.apk" | head -n1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-web2apk-${{ github.run_id }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 1
          
