name: Gradle Android Build

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL .zip project Android (Android Studio) yang akan di-build"
        required: true
      tag:
        description: "Tag unik untuk build ini (dipakai penamaan artifact)"
        required: true
      build_type:
        description: "debug atau release"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (opsional, hanya untuk workspace)
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download & extract project zip
        run: |
          mkdir -p project
          curl -L "${{ inputs.zip_url }}" -o project.zip
          unzip -q project.zip -d project
          # Jika zip berisi 1 folder pembungkus, masuk ke dalamnya otomatis
          INNER=$(find project -mindepth 1 -maxdepth 1 -type d | head -n1)
          if [ -f "$INNER/settings.gradle" ] || [ -f "$INNER/settings.gradle.kts" ]; then
            mv "$INNER"/* project/ 2>/dev/null || true
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x project/gradlew

      - name: Build APK (debug)
        if: inputs.build_type == 'debug'
        working-directory: project
        run: ./gradlew assembleDebug --stacktrace

      - name: Build APK (release)
        if: inputs.build_type == 'release'
        working-directory: project
        run: ./gradlew assembleRelease --stacktrace

      - name: Locate APK output
        id: locate
        run: |
          APK_PATH=$(find project -type f -name "*.apk" | head -n1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.tag }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 1
