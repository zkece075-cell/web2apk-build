name: Gradle Android Build

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL .zip project Android (Android Studio) yang akan di-build"
        required: true
      tag:
        description: "Tag unik untuk build ini (dipakai penamaan artifact)"
        required: true
      build_type:
        description: "debug atau release"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (opsional, hanya untuk workspace)
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download & extract project zip
        run: |
          mkdir -p project_raw
          curl -L "${{ inputs.zip_url }}" -o project.zip
          unzip -q project.zip -d project_raw

      - name: Cari folder root project (lokasi settings.gradle)
        id: findroot
        run: |
          # Cari file settings.gradle / settings.gradle.kts di kedalaman berapa pun,
          # lalu ambil folder tempat file itu berada sebagai root project asli.
          SETTINGS_FILE=$(find project_raw -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n1)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::Tidak ditemukan settings.gradle / settings.gradle.kts di dalam zip. Pastikan ini project Android Studio yang valid."
            exit 1
          fi

          PROJECT_ROOT=$(dirname "$SETTINGS_FILE")
          echo "Root project ditemukan di: $PROJECT_ROOT"
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for gradlew
        run: chmod +x "${{ steps.findroot.outputs.root }}/gradlew"

      - name: Build APK (debug)
        if: inputs.build_type == 'debug'
        working-directory: ${{ steps.findroot.outputs.root }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Build APK (release)
        if: inputs.build_type == 'release'
        working-directory: ${{ steps.findroot.outputs.root }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Locate APK output
        id: locate
        run: |
          APK_PATH=$(find "${{ steps.findroot.outputs.root }}" -type f -name "*.apk" | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::Build sukses tapi file APK tidak ditemukan."
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.tag }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 1
