name: Flutter APK Build

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL .zip project Flutter yang akan di-build"
        required: true
      tag:
        description: "Tag unik untuk build ini (dipakai penamaan artifact)"
        required: true
      build_type:
        description: "debug atau release"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Download & extract project zip
        run: |
          mkdir -p project_raw
          curl -L "${{ inputs.zip_url }}" -o project.zip
          unzip -q project.zip -d project_raw

      - name: Cari folder root project (lokasi pubspec.yaml)
        id: findroot
        run: |
          PUBSPEC_FILE=$(find project_raw -type f -name "pubspec.yaml" | head -n1)

          if [ -z "$PUBSPEC_FILE" ]; then
            echo "::error::Tidak ditemukan pubspec.yaml di dalam zip. Pastikan ini project Flutter yang valid."
            exit 1
          fi

          PROJECT_ROOT=$(dirname "$PUBSPEC_FILE")
          echo "Root project ditemukan di: $PROJECT_ROOT"
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Get dependencies
        working-directory: ${{ steps.findroot.outputs.root }}
        run: flutter pub get

      - name: Build APK (debug)
        if: inputs.build_type == 'debug'
        working-directory: ${{ steps.findroot.outputs.root }}
        run: flutter build apk --debug

      - name: Build APK (release)
        if: inputs.build_type == 'release'
        working-directory: ${{ steps.findroot.outputs.root }}
        run: flutter build apk --release

      - name: Locate APK output
        id: locate
        run: |
          APK_PATH=$(find "${{ steps.findroot.outputs.root }}" -type f -name "*.apk" | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::Build sukses tapi file APK tidak ditemukan."
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.tag }}
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 1
